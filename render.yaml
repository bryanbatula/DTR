services:
  - type: web
    name: dtr-api
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dtr-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://your-app.vercel.app   # update after Vercel deploy

databases:
  - name: dtr-postgres
    plan: free
    region: singapore
